    <link id="dynamic-favicon" rel="icon" type="image/jpeg" href="/logo-white-gede.jpg" />
    <script>
      // Membuat favicon menjadi bulat secara dinamis menggunakan Canvas
      window.addEventListener('DOMContentLoaded', () => {
        const img = new Image();
        img.crossOrigin = 'Anonymous'; // Mengizinkan external link jika diperlukan
        img.src = document.getElementById('dynamic-favicon').href;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const size = Math.min(img.width, img.height);
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          
          ctx.beginPath();
          ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(img, (size-img.width)/2, (size-img.height)/2, img.width, img.height);
          
          document.getElementById('dynamic-favicon').type = 'image/png';
          document.getElementById('dynamic-favicon').href = canvas.toDataURL('image/png');
        };
      });
    </script>
